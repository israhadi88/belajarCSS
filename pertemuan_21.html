<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/style_21.css" />
    <title>Form Registrasi</title>
  </head>
  <body>
    <form action="">
      <h3>Form Registrasi</h3>

      <input
        type="text"
        name="nama_depan"
        id="nama_depan"
        placeholder="Nama Depan"
      />
      <input
        type="text"
        name="nama_belakang"
        id="nama_belakang"
        placeholder="Nama Belakang"
      />

      <input
        type="email"
        name="email"
        id="email"
        placeholder="emailmu@email.com"
      />
      <input
        type="password"
        name="password"
        id="password"
        placeholder="Password"
      />
      <input
        type="password"
        name="re:password"
        id="re:password"
        placeholder="Ulangi password"
      />
      <div class="haveAccount">
        <p>
          Already Have Account?
          <a href="pertemuan_20_Form_Login.html">Sign In</a>
        </p>
      </div>
      <button type="submit">Daftar</button>
    </form>
  </body>
</html>
